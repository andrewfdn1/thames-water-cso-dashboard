name: Pi logs and health check

on:
  workflow_dispatch:
    inputs:
      lines:
        description: "Number of recent log lines to fetch"
        required: false
        default: "300"

jobs:
  fetch-logs:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch health check and recent logs from the Pi
        env:
          PI_DASHBOARD_URL: ${{ secrets.PI_DASHBOARD_URL }}
          PI_LOGS_KEY: ${{ secrets.PI_LOGS_KEY }}
          LINES: ${{ github.event.inputs.lines }}
        run: |
          set -euo pipefail
          if [ -z "${PI_DASHBOARD_URL:-}" ] || [ -z "${PI_LOGS_KEY:-}" ]; then
            echo "::error::PI_DASHBOARD_URL and/or PI_LOGS_KEY secrets are not set. Add them under Settings > Secrets and variables > Actions."
            exit 1
          fi

          # Diagnostic mode: show the real HTTP status and response body
          # instead of silently failing, since a plain success/failure
          # check wasn't enough to explain why this fails from here but
          # works fine from a real browser.
          fetch() {
            local label="$1" url="$2"
            echo "## $label"
            echo "URL: $url"
            code=$(curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                        -o /tmp/resp_body.txt -w "%{http_code}" --max-time 20 "$url" || echo "CURL_ERROR_$?")
            echo "HTTP status: $code"
            echo "--- response body (first 500 bytes) ---"
            head -c 500 /tmp/resp_body.txt 2>/dev/null || echo "(no body captured)"
            echo ""
            echo "--- end body ---"
          }

          fetch "/ping" "${PI_DASHBOARD_URL}/ping"
          echo ""
          fetch "/data snapshot" "${PI_DASHBOARD_URL}/data?cachebust=$(date +%s)"
          echo ""
          fetch "Recent app logs (last ${LINES} lines)" "${PI_DASHBOARD_URL}/internal/logs?key=${PI_LOGS_KEY}&lines=${LINES}"
